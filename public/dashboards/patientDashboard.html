<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — AYURCARE</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="dashboard-page">

  <!-- Mobile header -->
  <header class="mobile-header">
    <button class="hamburger" id="hamburger-btn" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <span class="logo">AYURCARE</span>
  </header>

  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo">AYURCARE</span>
        <button class="sidebar-close" id="sidebar-close" aria-label="Close menu">&times;</button>
      </div>

      <div class="sidebar-user">
        <span id="sidebar-user-name">Loading…</span>
      </div>

      <nav class="sidebar-nav" aria-label="Main navigation">
        <a href="#dashboard" class="nav-link active" data-section="dashboard">
          Dashboard
        </a>
        <a href="#account" class="nav-link" data-section="account">
          View Account
        </a>
        <a href="#notifications" class="nav-link" data-section="notifications">
          Notifications
          <span class="badge" id="notification-badge" hidden>0</span>
        </a>
        <a href="/dashboards/prakritiTest.html" class="nav-link">
          Prakriti Assessment
        </a>
        <a href="/dashboards/dietPlan.html" class="nav-link">
          Diet Plan
        </a>
        <a href="/dashboards/yogaSessions.html" class="nav-link">
          Yoga Sessions
        </a>
        <a href="/dashboards/plans.html" class="nav-link">
          Plans &amp; Payment
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="btn btn-outline btn-full" id="logout-btn">Logout</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">

      <!-- Dashboard section -->
      <section id="section-dashboard" class="content-section active">
        <h2>Welcome, <span id="client-name">…</span></h2>
        <div class="summary-cards">
          <div class="summary-card">
            <h3>Notifications</h3>
            <p class="summary-value" id="summary-notification-count">—</p>
            <p class="summary-label">unread</p>
          </div>
          <div class="summary-card">
            <h3>Prakriti Status</h3>
            <p class="summary-value" id="summary-prakriti-status">—</p>
          </div>
        </div>
      </section>

      <!-- View Account section -->
      <section id="section-account" class="content-section" hidden>
        <h2>View Account</h2>

        <div id="profile-load-error" class="error-banner" hidden></div>

        <form id="profile-form" novalidate>
          <div class="form-group">
            <label for="profile-name">Full Name</label>
            <input type="text" id="profile-name" name="name" required />
            <span class="field-error" id="profile-name-error"></span>
          </div>

          <div class="form-group">
            <label for="profile-email">Email</label>
            <input type="email" id="profile-email" name="email" readonly />
          </div>

          <div class="form-group">
            <label for="profile-role">Role</label>
            <input type="text" id="profile-role" name="role" readonly />
          </div>

          <div id="profile-success" class="success-banner" hidden>Profile updated successfully.</div>
          <div id="profile-error" class="error-banner" hidden></div>

          <button type="submit" class="btn btn-primary" id="profile-save-btn">Save Changes</button>
        </form>
      </section>

      <!-- Notifications section -->
      <section id="section-notifications" class="content-section" hidden>
        <h2>Notifications</h2>
        <div id="notifications-load-error" class="error-banner" hidden></div>
        <ul id="notifications-list" class="notifications-list" aria-live="polite">
          <li class="notifications-empty">Loading notifications…</li>
        </ul>
      </section>

    </main>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
